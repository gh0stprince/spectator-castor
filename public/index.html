<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hermes-live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0B0E14;
    --panel: #11151D;
    --panel-2: #151B26;
    --line: #1E2530;
    --text: #C8CFDB;
    --bright: #EEF2F8;
    --mute: #6B7484;
    --signal: #FFB454;   /* phosphor amber — the broadcast color */
    --live: #FF4D4D;     /* reserved for the LIVE dot only */
    --ok: #4FD6BE;
    --err: #FF6B6B;
    --human: #7AA2F7;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --disp: "Space Grotesk", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--ink); color: var(--text);
    font: 15px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
  }

  /* ── header ─────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px; border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--ink) 88%, black);
    position: sticky; top: 0; z-index: 10;
  }
  .wordmark { font: 700 15px/1 var(--disp); letter-spacing: .06em; color: var(--bright); }
  .wordmark em { font-style: normal; color: var(--signal); }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font: 500 11px/1 var(--mono); letter-spacing: .12em;
    padding: 5px 9px; border: 1px solid var(--line); border-radius: 3px; color: var(--mute);
  }
  .pill.live { color: var(--bright); border-color: #3a2626; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mute); }
  .pill.live .dot { background: var(--live); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  .title { font: 500 14px var(--disp); color: var(--bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spacer { flex: 1; }
  .chip { font: 400 11px var(--mono); color: var(--mute); border: 1px solid var(--line); padding: 4px 8px; border-radius: 3px; white-space: nowrap; }
  .viewers { font: 500 12px var(--mono); color: var(--signal); white-space: nowrap; }

  /* ── transcript ─────────────────────────────────────── */
  main { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { main { scroll-behavior: auto; } .pill.live .dot { animation: none; } }
  .feed { max-width: 720px; margin: 0 auto; padding: 26px 18px 120px; display: flex; flex-direction: column; gap: 16px; }

  .turn { display: flex; flex-direction: column; gap: 4px; }
  .who { font: 500 11px var(--mono); letter-spacing: .1em; text-transform: uppercase; }
  .who.agent { color: var(--signal); }
  .who.human { color: var(--human); }
  .msg { color: var(--bright); white-space: pre-wrap; word-wrap: break-word; }
  .msg code { font: 13px var(--mono); background: var(--panel-2); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; }
  .caret { display: inline-block; width: 8px; height: 15px; background: var(--signal); vertical-align: -2px; animation: pulse 1s steps(2) infinite; }

  .card {
    border: 1px solid var(--line); border-left: 2px solid var(--mute);
    background: var(--panel); border-radius: 4px; overflow: hidden;
  }
  .card.running { border-left-color: var(--signal); }
  .card.ok { border-left-color: var(--ok); }
  .card.error { border-left-color: var(--err); }
  .card.approval { border-left-color: var(--signal); background: color-mix(in srgb, var(--panel) 92%, var(--signal)); }
  .card-head {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    font: 500 12.5px var(--mono); color: var(--text); cursor: pointer; user-select: none;
  }
  .card-head .tname { color: var(--bright); }
  .card-head .tsum { color: var(--mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .badge { font: 500 10px var(--mono); letter-spacing: .08em; }
  .badge.run { color: var(--signal); }
  .badge.ok { color: var(--ok); }
  .badge.err { color: var(--err); }
  .badge.wait { color: var(--signal); animation: pulse 1.4s ease-in-out infinite; }
  .card-body { display: none; border-top: 1px solid var(--line); padding: 10px 12px; }
  .card.open .card-body { display: block; }
  .card-body pre { margin: 0; font: 12.5px/1.55 var(--mono); color: var(--text); white-space: pre-wrap; word-wrap: break-word; }
  .hint { font: 11px var(--mono); color: var(--mute); }

  .sys { font: 12px var(--mono); color: var(--mute); text-align: center; }

  /* ── on-air ticker (signature) ──────────────────────── */
  .ticker {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    display: flex; align-items: stretch;
    background: color-mix(in srgb, var(--ink) 84%, black);
    border-top: 1px solid var(--line);
  }
  .ticker .tag {
    display: flex; align-items: center; padding: 0 14px;
    font: 700 11px var(--disp); letter-spacing: .18em; color: var(--ink);
    background: var(--signal);
  }
  .ticker .state {
    flex: 1; display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; font: 500 12.5px var(--mono); color: var(--bright);
    overflow: hidden; white-space: nowrap;
  }
  .ticker .detail { color: var(--mute); overflow: hidden; text-overflow: ellipsis; }
  .ticker.idle .tag { background: var(--line); color: var(--mute); }

  #jump {
    position: fixed; right: 18px; bottom: 58px; z-index: 11; display: none;
    font: 500 12px var(--mono); color: var(--ink); background: var(--signal);
    border: 0; border-radius: 3px; padding: 8px 12px; cursor: pointer;
  }

  .gate { max-width: 460px; margin: 18vh auto 0; padding: 0 18px; text-align: center; }
  .gate h1 { font: 700 22px var(--disp); color: var(--bright); }
  .gate p { color: var(--mute); font: 13px var(--mono); }
</style>
</head>
<body>
  <header>
    <span class="wordmark">HERMES<em>·LIVE</em></span>
    <span class="pill" id="livePill"><span class="dot"></span><span id="pillText">OFFLINE</span></span>
    <span class="title" id="title"></span>
    <span class="spacer"></span>
    <span class="chip" id="model" hidden></span>
    <span class="viewers" id="viewers" hidden></span>
  </header>

  <main id="main">
    <div class="feed" id="feed">
      <div class="gate" id="gate">
        <h1>hermes-live</h1>
        <p id="gateMsg">connecting…</p>
      </div>
    </div>
  </main>

  <button id="jump">↓ jump to live</button>

  <div class="ticker idle" id="ticker">
    <span class="tag" id="tickerTag">STANDBY</span>
    <span class="state"><span id="tickerState">waiting for signal</span><span class="detail" id="tickerDetail"></span></span>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const feed = $("feed"), main = $("main");
  const key = new URLSearchParams(location.hash.slice(1)).get("k");
  if (!key) { $("gateMsg").textContent = "missing view key — use the full share link (…/watch#k=…)"; return; }

  // Tiny safe formatter: input is escaped first; only our own tags are added.
  const fmt = (s) => {
    const esc = String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return esc
      .replace(/`([^`\n]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
  };

  const messages = new Map(); // messageId -> {el, text}
  const tools = new Map();    // toolId -> {card, badge, pre, body}
  const approvals = new Map();
  let gateCleared = false, pinned = true, lastConnectionState = "", connectionNotice = null;

  main.addEventListener("scroll", () => {
    pinned = main.scrollTop + main.clientHeight > main.scrollHeight - 80;
    $("jump").style.display = pinned ? "none" : "block";
  });
  $("jump").onclick = () => { main.scrollTop = main.scrollHeight; };
  const stick = () => { if (pinned) main.scrollTop = main.scrollHeight; };

  const clearGate = () => { if (!gateCleared) { $("gate").remove(); gateCleared = true; } };
  const add = (el) => { clearGate(); feed.appendChild(el); stick(); };

  const setTicker = (tag, state, detail = "", idle = false) => {
    $("tickerTag").textContent = tag;
    $("tickerState").textContent = state;
    $("tickerDetail").textContent = detail ? "— " + detail : "";
    $("ticker").classList.toggle("idle", idle);
  };
  const setLive = (on, label) => {
    $("livePill").classList.toggle("live", on);
    $("pillText").textContent = label;
  };

  function agentTurn(messageId) {
    if (messages.has(messageId)) return messages.get(messageId);
    const turn = document.createElement("div");
    turn.className = "turn";
    turn.innerHTML = `<span class="who agent">hermes</span><span class="msg"></span>`;
    add(turn);
    const rec = { el: turn.querySelector(".msg"), text: "" };
    messages.set(messageId, rec);
    return rec;
  }

  const entityKey = (ev, id) => `${ev.sessionId || "live"}:${id}`;

  function toolCard(p) {
    const card = document.createElement("div");
    card.className = "card running";
    card.innerHTML = `
      <div class="card-head">
        <span class="badge run">▸ RUN</span>
        <span class="tname">${fmt(p.name || "tool")}</span>
        <span class="tsum">${fmt(p.summary || "")}</span>
      </div>
      <div class="card-body"><pre></pre></div>`;
    card.querySelector(".card-head").onclick = () => card.classList.toggle("open");
    add(card);
    return { card, badge: card.querySelector(".badge"), summary: card.querySelector(".tsum"), pre: card.querySelector("pre") };
  }

  const handlers = {
    "session.meta": (ev) => {
      clearGate();
      $("title").textContent = ev.payload.title || "";
      if (ev.payload.model) { $("model").textContent = ev.payload.model; $("model").hidden = false; }
      setLive(true, "LIVE"); setTicker("ON AIR", "session open", "", false);
    },
    "user.message": (ev) => {
      const t = document.createElement("div");
      t.className = "turn";
      t.innerHTML = `<span class="who human">${fmt(ev.actor?.name || "operator")}</span><span class="msg">${fmt(ev.payload.text || "")}</span>`;
      add(t);
    },
    "message.delta": (ev) => {
      const rec = agentTurn(entityKey(ev, ev.payload.messageId));
      rec.text += ev.payload.text || "";
      rec.el.innerHTML = fmt(rec.text) + '<span class="caret"></span>';
      stick();
    },
    "message.complete": (ev) => {
      const rec = agentTurn(entityKey(ev, ev.payload.messageId));
      rec.text = ev.payload.text ?? rec.text;
      rec.el.innerHTML = fmt(rec.text);
      stick();
    },
    "tool.start": (ev) => {
      const key = entityKey(ev, ev.payload.toolId);
      tools.set(key, toolCard(ev.payload));
      if (ev.payload.argsHidden) tools.get(key).pre.innerHTML = '<span class="hint">tool arguments hidden by the host</span>';
      setTicker("ON AIR", "running " + (ev.payload.name || "tool"));
    },
    "tool.progress": (ev) => {
      const t = tools.get(entityKey(ev, ev.payload.toolId)); if (!t) return;
      t.pre.textContent = ((t.pre.textContent || "") + "\n" + (ev.payload.chunk || "")).trim();
      t.card.classList.add("open");
      stick();
    },
    "tool.complete": (ev) => {
      const t = tools.get(entityKey(ev, ev.payload.toolId)); if (!t) return;
      const ok = ev.payload.status !== "error";
      t.card.classList.remove("running");
      t.card.classList.add(ok ? "ok" : "error");
      t.badge.className = "badge " + (ok ? "ok" : "err");
      t.badge.textContent = ok ? "✓ DONE" : "✗ FAIL";
      if (ev.payload.summary) t.card.querySelector(".tsum").innerHTML = fmt(ev.payload.summary);
      if (ev.payload.outputHidden && !t.pre.textContent) t.pre.innerHTML = '<span class="hint">tool output hidden by the host</span>';
      stick();
    },
    "approval.request": (ev) => {
      const card = document.createElement("div");
      card.className = "card approval open";
      card.innerHTML = `
        <div class="card-head">
          <span class="badge wait">⏸ APPROVAL</span>
          <span class="tname">${fmt(ev.payload.name || "action")}</span>
          <span class="tsum">${fmt(ev.payload.summary || "")}</span>
        </div>
        <div class="card-body"><pre><span class="hint">waiting for the operator…</span></pre></div>`;
      add(card);
      approvals.set(entityKey(ev, ev.payload.approvalId), card);
      setTicker("ON AIR", "waiting for approval", ev.payload.name || "");
    },
    "approval.decision": (ev) => {
      const card = approvals.get(entityKey(ev, ev.payload.approvalId)); if (!card) return;
      const ok = ev.payload.decision === "approve";
      const b = card.querySelector(".badge");
      b.className = "badge " + (ok ? "ok" : "err");
      b.textContent = ok ? "✓ APPROVED" : "✗ DENIED";
      card.querySelector("pre").textContent = ok ? "approved by the operator" : "denied by the operator";
      card.classList.remove("approval");
      card.classList.add(ok ? "ok" : "error");
    },
    "clarify.request": (ev) => {
      const t = document.createElement("div");
      t.className = "turn";
      t.innerHTML = `<span class="who agent">hermes · question</span><span class="msg">${fmt(ev.payload.text || "")}</span>`;
      add(t);
      setTicker("ON AIR", "waiting for the operator");
    },
    "presence.state": (ev) => {
      if (typeof ev.payload.viewers === "number") {
        $("viewers").hidden = false;
        $("viewers").textContent = "◉ " + ev.payload.viewers + " watching";
      }
    },
    "status": (ev) => {
      const s = ev.payload.state;
      if (s !== "connecting" && s !== "reconnecting") {
        lastConnectionState = "";
        connectionNotice?.remove();
        connectionNotice = null;
      }
      if (s === "thinking") setTicker("ON AIR", "thinking…");
      else if (s === "tooling") setTicker("ON AIR", "running " + (ev.payload.detail || "a tool"));
      else if (s === "waiting") setTicker("ON AIR", "waiting", ev.payload.detail || "");
      else if (s === "idle") setTicker("ON AIR", "idle — session open", ev.payload.detail || "");
      else if (s === "live") { setLive(true, "LIVE"); setTicker("ON AIR", "signal acquired", ev.payload.detail || ""); }
      else if (s === "connecting" || s === "reconnecting") {
        setLive(false, s.toUpperCase());
        setTicker("STANDBY", s + "…", ev.payload.detail || "", true);
        if (s === "reconnecting" && lastConnectionState !== s) {
          const n = document.createElement("div");
          n.className = "sys";
          n.textContent = "— " + s + " —";
          add(n);
          connectionNotice = n;
        }
        lastConnectionState = s;
      } else if (s === "ended") { setLive(false, "ENDED"); setTicker("OFF AIR", "broadcast ended", "", true); }
    },
  };

  let lastSeq = 0, retry = 800;
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws?key=${encodeURIComponent(key)}&since=${lastSeq}`);
    ws.onopen = () => { retry = 800; $("gateMsg") && ($("gateMsg").textContent = "signal acquired — waiting for events"); };
    ws.onmessage = (m) => {
      let ev; try { ev = JSON.parse(m.data); } catch { return; }
      if (ev.seq) lastSeq = Math.max(lastSeq, ev.seq);
      handlers[ev.kind]?.(ev);
    };
    ws.onclose = () => {
      setLive(false, "RECONNECTING");
      setTicker("STANDBY", "link lost — retrying", "", true);
      setTimeout(connect, retry);
      retry = Math.min(retry * 2, 10000);
    };
  }
  connect();
})();
</script>
</body>
</html>
