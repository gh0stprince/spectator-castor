name: Bug report
description: Report a reproducible Spectator problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Spectator. Never paste credentials or raw private Hermes frames here.
  - type: input
    id: spectator-version
    attributes:
      label: Spectator version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: hermes-version
    attributes:
      label: Hermes version
      placeholder: v0.18.2
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use synthetic data and remove tokens, viewer keys, and private paths.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, viewer keys, and private session data from this report.
          required: true
        - label: This is not a privately reportable security vulnerability.
          required: true
